################
# LLAMA FAMILY
################
# HF_TOKEN with access to meta-llama gated repos required.
#
# Llama 3.1/3.2: <|python_tag|> (id 128010) is the tool-call start token.
# Meta's prompt-format docs imply this token only fires with
# `Environment: ipython` in the system prompt (built-in tools / code
# interpreter), but empirically (verified 2026-05-02 via greedy generation
# on Llama-3.2-1B-Instruct and Llama-3.1-8B-Instruct using our standard
# OpenAI-style JSON tools= path through apply_chat_template), both variants
# DO emit <|python_tag|> as the first token of the tool-call response,
# followed by JSON. So id 128010 is the correct measurement target across
# the family for our harness.
#
# Note the JSON shape varies slightly between sizes:
#   3.2 1B/3B: <|python_tag|>{"type":"function","function":"NAME","parameters":...}
#   3.1 8B:    <|python_tag|>{"name":"NAME","parameters":...}
# Doesn't affect our next-token-probability measurement — we only care
# about the probability mass on the leading <|python_tag|> token.

meta-llama/Llama-3.2-1B-Instruct:
  dtype: bfloat16
  num_gpus: 1
  tool_use_start_token_id: 128010

meta-llama/Llama-3.2-3B-Instruct:
  dtype: bfloat16
  num_gpus: 1
  tool_use_start_token_id: 128010

meta-llama/Llama-3.1-8B-Instruct:
  dtype: bfloat16
  num_gpus: 1
  tool_use_start_token_id: 128010

meta-llama/Llama-3.1-70B-Instruct:
  dtype: bfloat16
  load_in_8bit: True
  num_gpus: 1
  tool_use_start_token_id: 128010



################
# GEMMA FAMILY
################
# Open-weight HF models, same code path as Qwen/Llama. HF_TOKEN with access
# to google/gemma gated repos required.

# Gemma 4:
# - Thinking-native. Reasoning is parsed from the thought channel:
#     <|channel>thought ... <channel|>
#   The chat template uses <|think|> as the thinking control token.
#   enable_thinking=False on the off-path suppresses generation in the
#   thought channel. Note: for 31B and 26B-A4B, Google's chat template
#   includes an empty thinking token to suppress "ghost" thought channels
#   when thinking is disabled — don't rely on that for E2B/E4B without
#   smoke-testing.
# - Native tool-call markers (verified directly from tokenizer.json on the
#   HF hub, 2026-05-02; consistent across E2B, E4B, and 31B):
#     <|tool_call> (id=48) ... <tool_call|> (id=49)   — assistant tool calls
#     <|tool>      (id=46) ... <tool|>      (id=47)   — tool definitions
#     <|tool_response> (id=50) ... <tool_response|> (id=51) — tool outputs
#     <|think|>    (id=98)                            — thinking control
#     <|channel>   (id=100) ... <channel|> (id=101)   — channel boundaries
#   Token-name aliases in tokenizer_config.json: stc_token, etc_token,
#   std_token, str_token, think_token, soc_token, eoc_token.
#   We use the numeric id (48) as our tool-call measurement target, matching
#   the convention for Qwen (151657) and Llama (128010).

google/gemma-4-E2B-it:
  dtype: bfloat16
  num_gpus: 1
  thinking_family: gemma4
  tool_use_start_token_id: 48

google/gemma-4-E4B-it:
  dtype: bfloat16
  num_gpus: 1
  thinking_family: gemma4
  tool_use_start_token_id: 48

google/gemma-4-31B-it:
  dtype: bfloat16
  num_gpus: 1
  thinking_family: gemma4
  tool_use_start_token_id: 48

google/gemma-4-26B-A4B-it:  # MoE, 4B active / 26B total. Defer per the
  dtype: bfloat16           # same batch=1-is-slow logic as Qwen3-30B-A3B.
  num_gpus: 1
  thinking_family: gemma4
  tool_use_start_token_id: 48


