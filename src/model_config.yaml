# Qwen 3 (released 2025-04). All support enable_thinking toggle in
# apply_chat_template; default is True. With continue_final_message=True
# and an assistant prefill, the rendered template injects an empty
# <think></think> block — effectively a force-skip-thinking regime that
# matches the Qwen 2.5 measurement protocol.
# Tool-call start token: <tool_call> = 151657 (same as Qwen 2.5 family).
